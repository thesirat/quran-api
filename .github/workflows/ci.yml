name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'api/**'
      - 'package.json'
      - 'tsconfig.json'
  pull_request:
    paths:
      - 'src/**'
      - 'api/**'
      - 'package.json'
      - 'tsconfig.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Lint
        run: npm run lint
