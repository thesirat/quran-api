name: Sync Quran static data

on:
  workflow_dispatch:
    inputs:
      include_tafsir:
        description: "Download tafsir JSON (tafsirs/ on repo root)"
        type: boolean
        default: true
      static_subpath:
        description: "Under repo root; empty = flat layout (script default)"
        type: string
        default: ""
      include_fonts:
        description: "Download fonts (fonts/ on repo root)"
        type: boolean
        default: true

  schedule:
    - cron: "0 6 * * 0" # weekly Sun 06:00 UTC — edit as needed

permissions:
  contents: write

concurrency:
  group: sync-quran-static-data
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # workflow_dispatch: use inputs; schedule: fallbacks match script defaults
      STATIC_SUBPATH: ${{ github.event.inputs.static_subpath || '' }}
      INCLUDE_TAFSIR: ${{ github.event.inputs.include_tafsir || 'true' }}
      INCLUDE_FONTS: ${{ github.event.inputs.include_fonts || 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download (repo root, flat JSON layout)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ARGS=(
            python3 scripts/download_data.py
            -o .
            --workers 32
          )
          if [ -n "${STATIC_SUBPATH}" ]; then
            ARGS+=( --static-subpath "${STATIC_SUBPATH}" )
          fi
          if [ "${INCLUDE_TAFSIR}" = "true" ]; then
            ARGS+=( --tafsir )
          fi
          if [ "${INCLUDE_FONTS}" = "true" ]; then
            ARGS+=( --fonts )
          fi
          "${ARGS[@]}"

      - name: Commit and push if changed
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Directories/files the mirror creates at repo root (flat layout)
          for p in \
            full-quran meta tajweed others morphology-data lexicon \
            words-data verse-translations timestamps; do
            if [ -e "$p" ]; then git add "$p"; fi
          done
          if [ -d tafsirs ]; then git add tafsirs; fi
          if [ -d fonts ]; then git add fonts; fi

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(data): refresh Quran static mirror"
          git push