name: Sync static CDN mirror

on:
  workflow_dispatch:
    inputs:
      include_tafsir:
        description: "Download tafsir JSON (3 editions × 114 chapters)"
        type: boolean
        default: true
      static_subpath:
        description: "Path under output for JSON (script default: data/v4)"
        type: string
        default: "data/v4"
      output_dir:
        description: "Directory under repo root to write files"
        type: string
        default: "cdn-mirror"

  schedule:
    # Weekly, Sunday 06:00 UTC — change as needed
    - cron: "0 6 * * 0"

permissions:
  contents: write

concurrency:
  group: sync-cdn-mirror
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mirror
        env:
          OUT_REL: ${{ inputs.output_dir }}
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          OUT="${ROOT}/${OUT_REL}"
          mkdir -p "${OUT}"

          ARGS=(
            python3 "${ROOT}/scripts/download_data.py"
            -o "${OUT}"
            --static-subpath "${{ inputs.static_subpath }}"
            --workers 32
          )
          if [ "${{ inputs.include_tafsir }}" = "true" ]; then
            ARGS+=( --tafsir )
          fi

          "${ARGS[@]}"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ inputs.output_dir }}"

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(data): refresh CDN mirror (${{ inputs.output_dir }})"
          git push