name: Sync Data Sources

on:
  schedule:
    - cron: '0 6 * * 0'   # Weekly, Sunday 6am UTC (use workflow_dispatch for an on-demand run)
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources to sync: qul-scrape, morphology (or 'all')"
        required: false
        default: "all"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        if: ${{ contains(github.event.inputs.sources || 'all', 'qul-scrape') || (github.event.inputs.sources || 'all') == 'all' }}
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}-chromium

      - name: Install Playwright browsers
        if: ${{ contains(github.event.inputs.sources || 'all', 'qul-scrape') || (github.event.inputs.sources || 'all') == 'all' }}
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install chromium --with-deps
          fi

      - name: Run sync scripts
        env:
          QUL_EMAIL: ${{ secrets.QUL_EMAIL }}
          QUL_PASSWORD: ${{ secrets.QUL_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: |
          INPUT="${{ github.event.inputs.sources || 'all' }}"
          echo "Syncing: $INPUT"
          if [[ "$INPUT" == "all" || "$INPUT" == *"qul-scrape"* ]]; then
            echo "--- Scraping QUL (Playwright) ---"
            python3 scripts/scrape_qul.py --resources all
          fi
          if [[ "$INPUT" == "all" || "$INPUT" == *"morphology"* ]]; then
            echo "--- Syncing Morphology ---"
            python3 scripts/sync_morphology.py
          fi

      - name: Show data tree status
        run: git status -sb data/ || true

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes under data/ — skipped commit (scraper produced no diff vs HEAD, or downloads failed). Check logs and repo secrets (QUL_EMAIL / QUL_PASSWORD for QUL)."
          else
            git commit -m "chore(data): refresh from QUL + corpus [skip ci]"
            git push
          fi
          echo "Sync job finished."
