name: Sync Data Sources

on:
  schedule:
    - cron: '0 6 * * 0'   # Weekly, Sunday 6am UTC (use workflow_dispatch for an on-demand run)
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated: 'all', 'qul-scrape' (full QUL), 'morphology' (sync_morphology.py → enriched_data.json), and/or scrape_qul keys (e.g. recitation,transliteration,similar-ayah,mushaf-layout)"
        required: false
        default: "all"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Decide Playwright / QUL scrape
        id: sync_plan
        run: |
          INPUT="${{ github.event.inputs.sources || 'all' }}"
          INPUT_NOSPACES="${INPUT//[[:space:]]/}"
          echo "input=$INPUT_NOSPACES" >> "$GITHUB_OUTPUT"
          if [[ "$INPUT_NOSPACES" == "all" || "$INPUT_NOSPACES" == *"qul-scrape"* ]]; then
            echo "qul_mode=all" >> "$GITHUB_OUTPUT"
            echo "needs_playwright=true" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT_NOSPACES" == "morphology" ]]; then
            echo "qul_mode=skip" >> "$GITHUB_OUTPUT"
            echo "needs_playwright=false" >> "$GITHUB_OUTPUT"
          else
            echo "qul_mode=list" >> "$GITHUB_OUTPUT"
            echo "needs_playwright=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Playwright browsers
        if: steps.sync_plan.outputs.needs_playwright == 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}-chromium

      - name: Install Playwright browsers
        if: steps.sync_plan.outputs.needs_playwright == 'true'
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install chromium --with-deps
          fi

      - name: Run sync scripts
        env:
          QUL_EMAIL: ${{ secrets.QUL_EMAIL }}
          QUL_PASSWORD: ${{ secrets.QUL_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: |
          INPUT="${{ steps.sync_plan.outputs.input }}"
          QUL_MODE="${{ steps.sync_plan.outputs.qul_mode }}"
          echo "Syncing: $INPUT (qul_mode=$QUL_MODE)"
          if [[ "$QUL_MODE" == "all" ]]; then
            echo "--- Scraping QUL (Playwright) ---"
            python3 scripts/scrape_qul.py --resources all
          elif [[ "$QUL_MODE" == "list" ]]; then
            echo "--- Scraping QUL (Playwright) ---"
            python3 scripts/scrape_qul.py --resources "$INPUT"
          fi
          if [[ "$INPUT" == "all" || "$INPUT" == *"morphology"* ]]; then
            echo "--- Syncing Morphology ---"
            python3 scripts/sync_morphology.py
          fi
          echo "--- Font catalog (for DATA_BASE_URL / GitHub raw) ---"
          python3 scripts/generate_font_catalog.py

      - name: Show data tree status
        run: git status -sb data/ || true

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes under data/ — skipped commit: output is byte-identical to HEAD."
            echo "The sync ran correctly; upstream sources and the generator produced the same JSON as what is already committed."
            echo "A commit only appears when upstream data or scripts change the file contents."
          else
            git commit -m "chore(data): refresh from QUL + corpus [skip ci]"
            git push
          fi
          echo "Sync job finished."
